<!DOCTYPE html>
<html lang="fi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO – Tehtävälista</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <div class="header-controls">
        <button id="lang-toggle" class="lang-toggle-btn" title="Vaihda kieli / Switch language">EN</button>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Vaihda teema" title="Vaihda dark/light">🌙</button>
      </div>
      <h1 data-i18n="app-title">Tehtävälista</h1>
      <p class="subtitle" data-i18n="app-subtitle">Hallitse päivittäiset tehtäväsi</p>
    </header>

    <!-- Add task form -->
    <section class="add-section" id="add-section" aria-label="Lisää uusi tehtävä">
      <form id="todo-form" novalidate>

        <div class="form-row">
          <div class="form-group">
            <label for="task-input">
              <span data-i18n="label-task">Tehtävä</span>
              <span class="required">*</span>
            </label>
            <input
              type="text"
              id="task-input"
              placeholder="Kirjoita tehtävä tähän..."
              autocomplete="off"
              maxlength="120"
              data-i18n-placeholder="placeholder-task"
            />
            <span class="error-msg" id="task-error" role="alert"></span>
          </div>

          <div class="form-group form-group--sm">
            <label for="priority-select" data-i18n="label-priority">Prioriteetti</label>
            <select id="priority-select">
              <option value="normal" data-i18n="opt-normal">Normaali</option>
              <option value="high"   data-i18n="opt-high">Korkea 🔴</option>
              <option value="low"    data-i18n="opt-low">Matala 🟢</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="due-date" data-i18n="label-due-date">Määräpäivä (valinnainen)</label>
            <input type="date" id="due-date" />
          </div>

          <div class="form-group checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="important-check" />
              <span class="checkmark"></span>
              <span data-i18n="label-important">Merkitse tärkeäksi ⭐</span>
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="add-btn" data-i18n="btn-add">
          + Lisää tehtävä
        </button>
      </form>
    </section>

    <!-- Stats bar -->
    <section class="stats-bar" id="stats-section" aria-label="Tilastot">
      <div class="stat">
        <span class="stat-number" id="count-all">0</span>
        <span class="stat-label" data-i18n="stat-total">Yhteensä</span>
      </div>
      <div class="stat stat--active">
        <span class="stat-number" id="count-active">0</span>
        <span class="stat-label" data-i18n="stat-active">Avoinna</span>
      </div>
      <div class="stat stat--done">
        <span class="stat-number" id="count-done">0</span>
        <span class="stat-label" data-i18n="stat-done">Tehty</span>
      </div>
    </section>

    <!-- Filter + sort bar -->
    <div class="toolbar">
      <div class="filter-btns" id="filter-group" role="group" aria-label="Suodata tehtäviä">
        <button class="filter-btn active" data-filter="all"       data-i18n="filter-all">Kaikki</button>
        <button class="filter-btn"        data-filter="active"    data-i18n="filter-active">Avoinna</button>
        <button class="filter-btn"        data-filter="done"      data-i18n="filter-done">Tehty</button>
        <button class="filter-btn"        data-filter="important" data-i18n="filter-important">Tärkeät ⭐</button>
      </div>
      <button class="btn btn-danger btn-sm" id="clear-done-btn"
              data-i18n="btn-clear-done" title="Poista kaikki tehdyt">
        🗑 Poista tehdyt
      </button>
    </div>

    <!-- Empty state -->
    <div class="empty-state hidden" id="empty-state">
      <div class="empty-icon">📭</div>
      <p data-i18n="empty-text">Ei tehtäviä näytettäväksi.</p>
    </div>

    <!-- Task list -->
    <ul class="todo-list" id="todo-list" aria-label="Tehtävälista" aria-live="polite"></ul>

  </div>

  <!-- Toast notification -->
  <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
